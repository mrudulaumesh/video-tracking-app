<!DOCTYPE html>
<html>
<head>
  <title>Video Tracking App</title>
  <meta charset="UTF-8">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    // Get user from URL
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user') || 'anonymous';

    gtag('js', new Date());
    gtag('config', 'G-9DTQP25WJ4', {
      user_id: user
    });

    window.currentUser = user;
  </script>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .card { background:#fff; padding:15px; margin:20px auto; max-width:700px; border-radius:10px; }
    iframe { width:100%; height:360px; }
  </style>
</head>

<body>

<h1>Training Videos</h1>
<div id="videoList"></div>

<script src="https://player.vimeo.com/api/player.js"></script>

<script>
  // 🔹 Add videos here
  const videos = [
    { id: "76979871", title: "Onboarding" },
    { id: "22439234", title: "Feature Walkthrough" }
  ];

  const container = document.getElementById('videoList');

  videos.forEach((video, index) => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3>${video.title}</h3>
      <iframe id="video_${index}"
        src="https://player.vimeo.com/video/${video.id}"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    `;

    container.appendChild(div);

    const iframe = document.getElementById(`video_${index}`);
    const player = new Vimeo.Player(iframe);

    // Track play
    player.on('play', function() {
      gtag('event', 'video_play', {
        video_title: video.title,
        video_id: video.id,
        user_id: window.currentUser
      });
    });

    // Track completion
    player.on('ended', function() {
      gtag('event', 'video_completed', {
        video_title: video.title,
        user_id: window.currentUser
      });
    });
  });
</script>

</body>
</html>
